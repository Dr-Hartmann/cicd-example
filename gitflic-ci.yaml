docker_package:
  stage: package
  image: docker:29.3.0
  script:
    - export CURRENT_NAME=${APP_NAME:-app}
    - export IMAGE_TAG=${CI_COMMIT_TAG:-latest}
    - >
      docker build 
      --build-arg APP_NAME=${CURRENT_NAME}
      --build-arg RUST_VERSION=${RUST_VERSION}
      --build-arg ALPINE_VERSION=${ALPINE_VERSION}
      -t ${CURRENT_NAME}:${IMAGE_TAG} .
    - docker save ${CURRENT_NAME}:${IMAGE_TAG} > ${CURRENT_NAME}.tar
  artifacts:
    paths:
      - "*.tar"
    expire_in: 1 week
