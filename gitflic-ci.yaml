# образ запуска, должен быть на хост-машине
image: rust:1.92-alpine3.22

# переменные окружения конвейера
variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  PROJECT_DIR: "./"
  RELEASE_VERSION: ${CI_COMMIT_TAG:latest}

# Кеширование зависимостей ускорит последующие сборки
cache:
  paths:
    - $CARGO_HOME
    - $PROJECT_DIR/target/

# выполняется перед каждой задачей
before_script:
  - echo "Скрипт до основных инструкций (в каждой задаче)"
  - cd ${PROJECT_DIR:-.}

# шаблон повторяющихся действий
.default_template:
  script:
    - echo "Executing script"

# выполняется после каждой задачи
after_script:
  - echo "Скрипт после основных инструкций (в каждой задаче)"

# типы задач
stages:
  # - lint
  # - test
  - build
  - deploy

# # Проверка форматирования и синтаксиса
# linting:
#   stage: lint
#   extends: .default_template
#   script:
#     - rustup component add rustfmt clippy
#     - cargo fmt --check
#     - cargo clippy -- -D warnings

# сначала описан build, но первым выполнится test
build:
  stage: build
  script:
    - echo $PROJECT_DIR
    - echo "Билд"
    # - cargo build --release
  # artifacts:
  #   paths:
  #     - target/release/cicd
  #   expire_in: 1 week

# # тесты
# unit-tests:
#   stage: test
#   script:
#     - cargo test --verbose

# сам деплой, включает сохранение артефакта в результаты конвейера
# Выгрузка в релизы (Generic Packages или Releases)
# Примечание: В GitFlic выгрузка в разделы "Релизы" часто требует API-вызова
deploy:
  stage: deploy
  needs:
    - build
  # rules:
  #   - if: $CI_DEFAULT_BRANCH # ручной запуск деплоя (последняя линия обороны, ответственность на человеке)
  #     when: manual
  #   - if: $CI_COMMIT_REF_NAME # Запускать только при создании тега (версии)
  #     when: on_success # по умолчанию
  script:
    - echo "Выгрузка артефакта для версии $RELEASE_VERSION"
    - mkdir -p artifacts_out
    - echo "Версия - $RELEASE_VERSION" > artifacts_out/artifact.txt
    - echo "Хеш - $CI_COMMIT_SHA" >> artifacts_out/artifact.txt
    - echo "Время - $CI_COMMIT_TIMESTAMP" >> artifacts_out/artifact.txt
    - echo "Ветка - $CI_COMMIT_REF_NAME" >> artifacts_out/artifact.txt
    - echo "Юзер - $GITFLIC_USER_EMAIL" >> artifacts_out/artifact.txt
    # Здесь обычно используется curl для загрузки в Generic Packages GitFlic
    # Или просто сохранение артефакта с длительным сроком хранения
  artifacts:
    paths:
      - artifacts_out/artifact.txt
      - target/release/cicd
    expire_in: 1 month
