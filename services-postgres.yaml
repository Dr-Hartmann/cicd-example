services:
  postgres:
    image: postgres:18-alpine
    restart: no

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - pg-data:/var/lib/postgresql

    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

    shm_size: 256mb

    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512mb

  pgAdmin:
    image: dpage/pgadmin4:9.10.0
    restart: "always"

    environment:
      PGADMIN_DEFAULT_EMAIL: ${DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: ${MASTER_PASSWORD_REQUIRED}

    ports:
      - "${ADMIN_PORT}:80"

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 512mb

    depends_on:
      postgres:
        condition: service_healthy
